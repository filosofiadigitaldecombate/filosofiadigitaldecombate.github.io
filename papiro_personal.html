<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Mi Papiro · P∆PIR°</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{overflow-x:hidden;min-height:100%;background:#0A0806;}
body{opacity:0;transition:opacity .4s;}

canvas#capa1{position:fixed;inset:0;z-index:0;width:100%;height:100%;pointer-events:none;}

/* CAPA 2 */
#capa2{position:relative;z-index:2;width:100%;overflow-x:hidden;min-height:100vh;
  background:radial-gradient(ellipse at 50% 5%,rgba(200,169,106,.05) 0%,transparent 35%),
  linear-gradient(180deg,#0A0806,#120C08 50%,#0A0806);}

/* CAPA 3 — el paño del papiro */
#capa3{position:relative;z-index:4;margin:0 37px;min-height:100vh;overflow-x:hidden;
  background:
    repeating-linear-gradient(45deg,rgba(200,169,106,.01) 0px,rgba(200,169,106,.01) 1px,transparent 1px,transparent 22px),
    linear-gradient(160deg,#130E09,#0E0A06 50%,#130E09);}

@keyframes bf{from{background-position:0 0%;}to{background-position:0 100%;}}
@keyframes oroFlow{from{background-position:0% center;}to{background-position:500% center;}}
@keyframes logoGlow{0%,100%{filter:drop-shadow(0 0 14px rgba(200,169,106,.35));}50%{filter:drop-shadow(0 0 36px rgba(230,194,122,.7));}}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}

/* BORDES z:9 */
.borde-izq{position:fixed;top:0;bottom:0;left:0;width:32px;z-index:9;pointer-events:none;
  background:linear-gradient(180deg,#2A1800,#8c6a3d 20%,#c8a96a 35%,#e6c27a 50%,#c8a96a 65%,#8c6a3d 80%,#2A1800);
  background-size:100% 300%;animation:bf 8s linear infinite;
  box-shadow:inset -2px 0 8px rgba(0,0,0,.8),3px 0 16px rgba(200,169,106,.12);}
.borde-der{position:fixed;top:0;bottom:0;right:0;width:32px;z-index:9;pointer-events:none;
  background:linear-gradient(180deg,#2A1800,#8c6a3d 20%,#c8a96a 35%,#e6c27a 50%,#c8a96a 65%,#8c6a3d 80%,#2A1800);
  background-size:100% 300%;animation:bf 8s linear infinite reverse;
  box-shadow:inset 2px 0 8px rgba(0,0,0,.8),-3px 0 16px rgba(200,169,106,.12);}

/* MÁRGENES z:10 */
.ml{position:fixed;top:0;bottom:0;width:37px;z-index:10;pointer-events:all;cursor:pointer;background:transparent;}
.ml.L{left:0;}.ml.R{right:0;}
.ml.L::after{content:'';position:absolute;top:0;bottom:0;right:0;width:5px;
  background:linear-gradient(180deg,#5a4324,#c8a96a 20%,#e6c27a 40%,#c8a96a 60%,#8c6a3d 80%,#5a4324);
  background-size:100% 300%;animation:bf 35s linear infinite;box-shadow:0 0 6px rgba(200,169,106,.4);}
.ml.R::after{content:'';position:absolute;top:0;bottom:0;left:0;width:5px;
  background:linear-gradient(180deg,#5a4324,#c8a96a 20%,#e6c27a 40%,#c8a96a 60%,#8c6a3d 80%,#5a4324);
  background-size:100% 300%;animation:bf 35s linear infinite reverse;box-shadow:0 0 6px rgba(200,169,106,.4);}

/* CAPA 4 — botones ° y ∆ */
#capa4{position:fixed;inset:0;z-index:6;pointer-events:none;}
.btn-f{position:absolute;pointer-events:all;cursor:pointer;width:58px;height:58px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;background:transparent;
  border:1.5px solid #c8a96a;box-shadow:0 0 12px rgba(200,169,106,.25);transition:background .3s;}
.btn-f:active{background:rgba(200,169,106,.12);transform:scale(.92);}
.btn-f.izq{bottom:20px;left:42px;}
.btn-f.der{bottom:20px;right:42px;}
.btn-f.izq span{font-family:'Cinzel',serif;font-size:53px;font-weight:900;pointer-events:none;
  background:linear-gradient(180deg,#5a4324,#c8a96a 20%,#e6c27a 40%,#c8a96a 60%,#8c6a3d 80%,#5a4324);
  background-size:100% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;animation:bf 35s linear infinite;}
.btn-f.der span{font-family:'Cinzel',serif;font-size:32px;font-weight:900;pointer-events:none;
  background:linear-gradient(180deg,#5a4324,#c8a96a 20%,#e6c27a 40%,#c8a96a 60%,#8c6a3d 80%,#5a4324);
  background-size:100% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;animation:bf 35s linear infinite reverse;}

/* CAPA 5 */
#capa5{position:fixed;inset:0;z-index:8;pointer-events:none;opacity:0;visibility:hidden;}

/* ══ CONTENIDO DEL PAPIRO PERSONAL ══ */
.papiro-pad{padding:28px 18px 120px;}

/* Cabecera del perfil */
.perfil-header{display:flex;flex-direction:column;align-items:center;gap:12px;padding-bottom:18px;
  border-bottom:1px solid rgba(200,169,106,.12);margin-bottom:18px;}
.avatar-ring{width:90px;height:90px;border-radius:50%;border:2px solid #c8a96a;
  display:flex;align-items:center;justify-content:center;position:relative;
  box-shadow:0 0 20px rgba(200,169,106,.2);overflow:hidden;background:#1a1208;cursor:pointer;}
.avatar-ring img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.avatar-placeholder{font-size:36px;}
.avatar-edit{position:absolute;bottom:0;right:0;width:24px;height:24px;border-radius:50%;
  background:#c8a96a;display:flex;align-items:center;justify-content:center;font-size:12px;}
.perfil-nom{font-family:'Cinzel',serif;font-size:18px;font-weight:900;letter-spacing:3px;
  background:linear-gradient(90deg,#5a4324,#c8a96a,#e6c27a,#c8a96a,#5a4324);
  background-size:300% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;animation:oroFlow 8s linear infinite;}
.perfil-pensamiento{font-family:'Crimson Pro',serif;font-style:italic;font-size:16px;
  color:rgba(255,255,255,.4);text-align:center;line-height:1.7;max-width:260px;}
.stats-row{display:flex;gap:24px;margin-top:4px;}
.stat{display:flex;flex-direction:column;align-items:center;gap:2px;}
.stat-num{font-family:'Cinzel',serif;font-size:18px;font-weight:900;
  background:linear-gradient(135deg,#c8a96a,#e6c27a);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;}
.stat-lbl{font-size:8px;letter-spacing:3px;color:rgba(200,169,106,.35);}

/* Botón publicar */
.btn-publicar{width:100%;padding:14px;border-radius:8px;
  background:rgba(200,169,106,.06);border:1px solid rgba(200,169,106,.25);
  color:rgba(255,255,255,.5);font-family:'Cinzel',serif;font-size:11px;letter-spacing:3px;
  cursor:pointer;margin-bottom:18px;text-align:left;display:flex;align-items:center;gap:10px;}
.btn-publicar:active{background:rgba(200,169,106,.12);}
.btn-pub-ico{font-size:20px;}
.sep{width:100%;height:1px;margin:16px 0;
  background:linear-gradient(to right,transparent,rgba(200,169,106,.2),transparent);}

/* Panel de publicación */
.panel-pub{background:rgba(200,169,106,.04);border:1px solid rgba(200,169,106,.15);
  border-radius:10px;padding:16px;margin-bottom:18px;display:none;animation:fadeIn .3s ease;}
.panel-pub.activo{display:block;}
.pub-textarea{width:100%;min-height:100px;background:rgba(255,255,255,.03);
  border:1px solid rgba(200,169,106,.15);border-radius:8px;padding:12px;
  color:#FFF;font-family:'Crimson Pro',serif;font-size:17px;line-height:1.8;
  resize:none;outline:none;-webkit-appearance:none;}
.pub-textarea::placeholder{color:rgba(255,255,255,.2);}
.pub-acciones{display:flex;gap:10px;margin-top:10px;align-items:center;}
.pub-media{display:flex;gap:8px;}
.btn-media{padding:8px 12px;border-radius:20px;border:1px solid rgba(200,169,106,.2);
  background:transparent;color:rgba(200,169,106,.6);font-size:12px;cursor:pointer;}
.btn-media:active{background:rgba(200,169,106,.1);}
.btn-enviar-pub{margin-left:auto;padding:10px 20px;border-radius:20px;
  border:1.5px solid #c8a96a;background:rgba(200,169,106,.08);
  color:#c8a96a;font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;cursor:pointer;}
.btn-enviar-pub:active{background:rgba(200,169,106,.2);}
.preview-img{width:100%;border-radius:8px;margin-top:10px;display:none;max-height:200px;object-fit:cover;}

/* Pestañas */
.tabs{display:flex;gap:0;margin-bottom:18px;border-bottom:1px solid rgba(200,169,106,.12);}
.tab{flex:1;padding:12px 0;text-align:center;font-family:'Cinzel',serif;font-size:10px;
  letter-spacing:3px;color:rgba(200,169,106,.3);cursor:pointer;border-bottom:2px solid transparent;
  transition:all .2s;}
.tab.activo{color:#c8a96a;border-bottom-color:#c8a96a;}

/* Publicaciones grid */
.pubs-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.pub-card{border-radius:8px;overflow:hidden;cursor:pointer;aspect-ratio:1;
  background:rgba(200,169,106,.04);border:1px solid rgba(200,169,106,.08);
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;
  position:relative;}
.pub-card.con-img img{width:100%;height:100%;object-fit:cover;}
.pub-card.texto{padding:12px;align-items:flex-start;}
.pub-texto-preview{font-family:'Crimson Pro',serif;font-size:14px;color:rgba(255,255,255,.6);
  line-height:1.6;overflow:hidden;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;}
.pub-empty-ico{font-size:28px;opacity:.2;}
.pub-empty-txt{font-size:8px;letter-spacing:2px;color:rgba(200,169,106,.2);text-align:center;}
.pub-badge{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.7);
  font-size:8px;letter-spacing:1px;color:rgba(200,169,106,.5);padding:2px 6px;border-radius:10px;}

/* Tab lista */
.pubs-lista{display:flex;flex-direction:column;gap:12px;}
.pub-item{border:1px solid rgba(200,169,106,.1);border-radius:10px;padding:14px;
  background:rgba(200,169,106,.03);cursor:pointer;}
.pub-item:active{background:rgba(200,169,106,.08);}
.pub-fecha{font-size:8px;letter-spacing:2px;color:rgba(200,169,106,.3);margin-bottom:6px;}
.pub-contenido{font-family:'Crimson Pro',serif;font-size:16px;color:rgba(255,255,255,.7);line-height:1.7;}
.pub-img-preview{width:100%;border-radius:6px;margin-top:8px;max-height:140px;object-fit:cover;}

/* BAÚL */
.baul{padding-top:1300vh;padding-bottom:60px;text-align:center;}
.baul-rule{width:70%;height:1px;margin:0 auto 28px;
  background:linear-gradient(to right,transparent,#c8a96a,#e6c27a,#c8a96a,transparent);}
/* Posdata en el baúl */
.posdata-titulo{font-family:'Cinzel',serif;font-size:11px;letter-spacing:5px;
  color:rgba(200,169,106,.4);margin-bottom:14px;display:block;}
.posdata-box{border:1px solid rgba(200,169,106,.15);border-radius:10px;padding:16px;
  margin:0 auto 20px;max-width:280px;background:rgba(200,169,106,.03);}
.posdata-txt{font-family:'Crimson Pro',serif;font-style:italic;font-size:16px;
  color:rgba(255,255,255,.4);line-height:1.8;text-align:left;}
.posdata-input{width:100%;background:transparent;border:none;outline:none;
  color:rgba(255,255,255,.5);font-family:'Crimson Pro',serif;font-style:italic;
  font-size:16px;resize:none;line-height:1.8;-webkit-appearance:none;}
.posdata-input::placeholder{color:rgba(200,169,106,.15);}
.btn-guardar-posdata{width:100%;max-width:280px;padding:12px;margin:0 auto;display:block;
  border:1px solid rgba(200,169,106,.3);background:transparent;
  color:rgba(200,169,106,.6);font-family:'Cinzel',serif;font-size:10px;
  letter-spacing:3px;cursor:pointer;border-radius:6px;}
.btn-guardar-posdata:active{background:rgba(200,169,106,.1);}
.bn{font-family:'Cinzel',serif;font-size:22px;font-weight:900;letter-spacing:6px;
  display:block;margin-bottom:10px;color:#c8a96a;
  opacity:0;transform:translateY(30px);transition:opacity .8s,transform .8s;}
.bs{font-size:10px;letter-spacing:3px;color:rgba(200,169,106,.3);display:block;margin-bottom:4px;
  opacity:0;transform:translateY(20px);transition:opacity .8s .3s,transform .8s .3s;}
.vis{opacity:1!important;transform:translateY(0)!important;}
#bS1{transition-delay:.15s!important;}#bS2{transition-delay:.30s!important;}

/* Modal */
.modal{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.96);
  display:none;flex-direction:column;align-items:center;justify-content:center;padding:28px;gap:14px;}
.modal.on{display:flex;animation:fadeIn .3s ease;}
.modal-t{font-family:'Cinzel',serif;font-size:16px;letter-spacing:3px;color:#FFF;text-align:center;}
.modal-s{font-family:'Crimson Pro',serif;font-style:italic;font-size:15px;
  color:rgba(200,169,106,.5);text-align:center;line-height:1.8;max-width:280px;}
.modal-b{padding:10px 24px;border:1px solid rgba(200,169,106,.3);border-radius:30px;
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;
  color:rgba(200,169,106,.6);background:transparent;cursor:pointer;}
</style>
</head>
<body>

<canvas id="capa1"></canvas>
<div class="borde-izq"></div><div class="borde-der"></div>
<div class="ml L" onclick="ir('portada_es.html')"></div>
<div class="ml R" onclick="ir('salon.html')"></div>
<div id="capa4">
  <div class="btn-f izq" onclick="ir('portada_es.html')"><span>°</span></div>
  <div class="btn-f der" onclick="ir('salon.html')"><span>∆</span></div>
</div>
<div id="capa5"></div>

<div id="capa2"><div id="capa3">
<div class="papiro-pad">

  <!-- CABECERA DEL PERFIL -->
  <div class="perfil-header">
    <div class="avatar-ring" onclick="cambiarFoto()">
      <img id="avatar-img" src="" alt="" style="display:none;">
      <span class="avatar-placeholder" id="avatar-placeholder">👤</span>
      <span class="avatar-edit">✎</span>
    </div>
    <input type="file" id="input-foto" accept="image/*" onchange="previewFoto(this)" style="display:none;">

  <!-- BOTÓN PUBLICAR -->

  <!-- PANEL DE PUBLICACIÓN -->

    <textarea class="pub-textarea" id="pub-texto"
      placeholder="Escribe lo que quieras en tu papiro...&#10;Un pensamiento · Una historia · Un momento."></textarea>
    <img id="pub-preview" class="preview-img" alt="">
    <div class="pub-acciones">
      <div class="pub-media">
        <label class="btn-media" for="input-pub-img">📷</label>
        <input type="file" id="input-pub-img" accept="image/*" onchange="previewPubImg(this)" style="display:none;">
      </div>
      <button class="btn-enviar-pub" onclick="publicar()">PUBLICAR ∆</button>
    </div>
  </div>

  <!-- PESTAÑAS -->
  <div class="tabs">
    <div class="tab activo" id="tab-grid" onclick="cambiarTab('grid')">▦ GRID</div>
    <div class="tab" id="tab-lista" onclick="cambiarTab('lista')">≡ LISTA</div>
  </div>

  <!-- GRID DE PUBLICACIONES -->
  <div class="pubs-grid" id="pubs-grid">
    <!-- Se llena con JS -->
    <div class="pub-card" id="empty-card">
      <span class="pub-empty-ico">📜</span>
      <span class="pub-empty-txt">TU PRIMER<br>PAPIRO</span>

  <!-- LISTA DE PUBLICACIONES -->
  <div class="pubs-lista" id="pubs-lista" style="display:none;"></div>

  <!-- BAÚL -->
  <div class="baul">
    <div class="baul-rule"></div>
    <span class="bn" id="bN">P∆PIR°</span>
    <span class="bs" id="bS1">POSDATA</span>

    <!-- Posdata del baúl -->
    <div class="posdata-box">
      <textarea class="posdata-input" id="posdata-input"
        rows="4"
        placeholder="Escribe tu posdata aquí...&#10;Lo que guardas al fondo del papiro."></textarea>
    </div>
    <button class="btn-guardar-posdata" onclick="guardarPostdata()">GUARDAR POSDATA</button>
    <div class="bs" id="bS2" style="margin-top:16px;">∆° · X-7777777-LC7°</div>
  </div>

</div></div></div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="if(event.target===this)cerrarModal()">
  <div class="modal-t" id="modal-t">···</div>
  <div class="modal-s" id="modal-s"></div>
  <button class="modal-b" onclick="cerrarModal()">OK</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
'use strict';
var SBURL='https://vdtdrijfcmttssfdtgva.supabase.co';
var SBKEY='sb_publishable_PwlfxDM8vqAB_-LsJVMouw_Arg6epEB';
var sb=null;
try{
  sb=window.supabase.createClient(SBURL,SBKEY,{
    auth:{persistSession:false,autoRefreshToken:false,detectSessionInUrl:false}
  });
}catch(x){}

// Estado local
var USER={
  id: localStorage.getItem('papiro_usuario')||'anon',
  nombre: localStorage.getItem('pap_nombre')||'Mi Papiro',
  nivel: parseInt(localStorage.getItem('pap_nivel')||'1'),
  bs: parseFloat(localStorage.getItem('pap_bs')||'1.000')
};

var PUBS = JSON.parse(localStorage.getItem('pap_pubs')||'[]');
var imgPubData = null;

/* COSMOS */
(function(){
  var c=document.getElementById('capa1'),ctx=c.getContext('2d');
  function rz(){c.width=innerWidth;c.height=innerHeight;}rz();addEventListener('resize',rz);
  var S=[],cols=['rgba(200,169,106,','rgba(230,194,122,','rgba(90,67,36,','rgba(255,255,255,'];
  for(var i=0;i<200;i++)S.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,
    r:Math.random()*.4+.1,ph:Math.random()*Math.PI*2,sp:Math.random()*.001+.0003,col:cols[i%4]});
  var shown=false;
  function draw(){
    requestAnimationFrame(draw);ctx.fillStyle='#0A0806';ctx.fillRect(0,0,c.width,c.height);
    S.forEach(function(s){s.ph+=s.sp;var a=Math.max(0,Math.sin(s.ph));a=Math.min(a*a,1);
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=s.col+a+')';ctx.globalAlpha=1;ctx.fill();});
    ctx.globalAlpha=1;if(!shown){shown=true;document.body.style.opacity='1';}
  }draw();
})();

window.addEventListener('load',function(){
  cargarPerfil();
  renderPubs();
  cargarPostdata();
});

/* CARGAR PERFIL */
async function cargarPerfil(){
  document.getElementById('nom-display').textContent=USER.nombre;
  document.getElementById('stat-niv').textContent=USER.nivel;
  document.getElementById('stat-bs').textContent=USER.bs.toFixed(3);
  document.getElementById('stat-pubs').textContent=PUBS.length;

  // Cargar pensamiento guardado
  var pens=localStorage.getItem('pap_pensamiento')||'';
  if(pens) document.getElementById('pensamiento-display').textContent=pens;

  // Cargar foto guardada
  var fotoUrl=localStorage.getItem('pap_foto')||'';
  if(fotoUrl){
    document.getElementById('avatar-img').src=fotoUrl;
    document.getElementById('avatar-img').style.display='block';
    document.getElementById('avatar-placeholder').style.display='none';
  }

  // Si tiene Supabase, intentar cargar perfil real
  if(sb&&USER.id!=='anon'){
    try{
      var r=await sb.from('perfiles').select('display_name,pensamiento,foto_url,bolivares_digitales,nivel').eq('user_id',USER.id).single();
      if(r.data){
        if(r.data.display_name){USER.nombre=r.data.display_name;document.getElementById('nom-display').textContent=USER.nombre;}
        if(r.data.pensamiento){document.getElementById('pensamiento-display').textContent=r.data.pensamiento;}
        if(r.data.foto_url){document.getElementById('avatar-img').src=r.data.foto_url;document.getElementById('avatar-img').style.display='block';document.getElementById('avatar-placeholder').style.display='none';}
        if(r.data.bolivares_digitales){document.getElementById('stat-bs').textContent=parseFloat(r.data.bolivares_digitales).toFixed(3);}
        if(r.data.nivel){document.getElementById('stat-niv').textContent=r.data.nivel;}
      }
    }catch(e){}
  }
}

/* CAMBIAR FOTO */
function cambiarFoto(){document.getElementById('input-foto').click();}
function previewFoto(input){
  if(!input.files||!input.files[0])return;
  var reader=new FileReader();
  reader.onloadend=function(){
    var url=reader.result;
    document.getElementById('avatar-img').src=url;
    document.getElementById('avatar-img').style.display='block';
    document.getElementById('avatar-placeholder').style.display='none';
    localStorage.setItem('pap_foto',url);
    modal('✦ Foto actualizada!','');setTimeout(cerrarModal,1500);
  };
  reader.readAsDataURL(input.files[0]);
}

/* EDITAR PENSAMIENTO */
function editarPensamiento(){
  var actual=document.getElementById('pensamiento-display').textContent;
  var nuevo=prompt('Tu pensamiento del día:',actual==='Toca aquí para escribir tu pensamiento del día...'?'':actual);
  if(nuevo!==null&&nuevo.trim()){
    document.getElementById('pensamiento-display').textContent=nuevo.trim();
    localStorage.setItem('pap_pensamiento',nuevo.trim());
  }
}

/* PANEL PUBLICAR */
function togglePanel(){
  var p=document.getElementById('panel-pub');
  p.classList.toggle('activo');
  if(p.classList.contains('activo'))document.getElementById('pub-texto').focus();
}

function previewPubImg(input){
  if(!input.files||!input.files[0])return;
  var reader=new FileReader();
  reader.onloadend=function(){
    imgPubData=reader.result;
    var prev=document.getElementById('pub-preview');
    prev.src=imgPubData;prev.style.display='block';
  };
  reader.readAsDataURL(input.files[0]);
}

function publicar(){
  var texto=document.getElementById('pub-texto').value.trim();
  if(!texto&&!imgPubData){modal('Escribe algo','Tu papiro no puede estar vacío.');return;}
  var pub={
    id:Date.now(),
    texto:texto,
    imagen:imgPubData||null,
    fecha:new Date().toLocaleDateString('es',{day:'numeric',month:'short',year:'numeric'}),
    hora:new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'})
  };
  PUBS.unshift(pub);
  localStorage.setItem('pap_pubs',JSON.stringify(PUBS));
  document.getElementById('pub-texto').value='';
  imgPubData=null;
  document.getElementById('pub-preview').style.display='none';
  document.getElementById('pub-preview').src='';
  document.getElementById('input-pub-img').value='';
  document.getElementById('panel-pub').classList.remove('activo');
  document.getElementById('stat-pubs').textContent=PUBS.length;
  renderPubs();
  modal('✦ Publicado!','Tu papiro está listo.');setTimeout(cerrarModal,1500);
}

/* RENDER PUBLICACIONES */
function renderPubs(){
  var grid=document.getElementById('pubs-grid');
  var lista=document.getElementById('pubs-lista');
  grid.innerHTML='';lista.innerHTML='';
  if(PUBS.length===0){
    grid.innerHTML='<div class="pub-card"><span class="pub-empty-ico">📜</span><span class="pub-empty-txt">TU PRIMER<br>PAPIRO</span></div>';
    lista.innerHTML='<div style="text-align:center;padding:28px;font-family:\'Crimson Pro\',serif;font-style:italic;font-size:14px;color:rgba(200,169,106,.3);">Aún no has publicado nada en tu papiro.</div>';
    return;
  }
  PUBS.forEach(function(p){
    // GRID
    var card=document.createElement('div');
    card.className='pub-card'+(p.imagen?' con-img':' texto');
    if(p.imagen){
      card.innerHTML='<img src="'+p.imagen+'" alt="">'
        +'<span class="pub-badge">'+p.fecha+'</span>';
    }else{
      card.innerHTML='<div class="pub-texto-preview">'+p.texto+'</div>'
        +'<span class="pub-badge">'+p.fecha+'</span>';
    }
    grid.appendChild(card);
    // LISTA
    var item=document.createElement('div');
    item.className='pub-item';
    item.innerHTML='<div class="pub-fecha">'+p.fecha+' · '+p.hora+'</div>'
      +(p.texto?'<div class="pub-contenido">'+p.texto+'</div>':'')
      +(p.imagen?'<img class="pub-img-preview" src="'+p.imagen+'" alt="">':'');
    lista.appendChild(item);
  });
}

/* PESTAÑAS */
function cambiarTab(tab){
  var esGrid=tab==='grid';
  document.getElementById('tab-grid').classList.toggle('activo',esGrid);
  document.getElementById('tab-lista').classList.toggle('activo',!esGrid);
  document.getElementById('pubs-grid').style.display=esGrid?'grid':'none';
  document.getElementById('pubs-lista').style.display=esGrid?'none':'flex';
}

/* POSDATA */
function cargarPostdata(){
  var p=localStorage.getItem('pap_posdata')||'';
  if(p)document.getElementById('posdata-input').value=p;
}
function guardarPostdata(){
  var txt=document.getElementById('posdata-input').value.trim();
  localStorage.setItem('pap_posdata',txt);
  modal('✦ Posdata guardada','La encontrarán al llegar al fondo de tu papiro.');setTimeout(cerrarModal,2000);
}

/* BAÚL TRIGGER */
window.addEventListener('scroll',function(){
  if((window.scrollY||window.pageYOffset)>window.innerHeight*13)
    ['bN','bS1','bS2'].forEach(function(id){var el=document.getElementById(id);if(el)el.classList.add('vis');});
},{passive:true});

/* HELPERS */
function modal(t,s){document.getElementById('modal-t').textContent=t;document.getElementById('modal-s').textContent=s||'';document.getElementById('modal').classList.add('on');}
function cerrarModal(){document.getElementById('modal').classList.remove('on');}
function ir(url){document.body.style.opacity='0';setTimeout(function(){location.href=url;},280);}
</script>
</body>
</html>
