<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>P∆PIR° · Selección de Idioma</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:#FFF;}
canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
@keyframes comandoEsp{0%{background-position:0% 0%;}50%{background-position:0% 100%;}100%{background-position:0% 0%;}}
@keyframes oroVivo{0%{background-position:0% center;}100%{background-position:500% center;}}

.screen{position:fixed;inset:0;z-index:2;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:28px 20px;background:#FFF;}

/* LOGO */
.logo{font-family:'Cinzel',serif;font-size:56px;font-weight:900;letter-spacing:10px;
  -webkit-text-stroke:1.2px #C9A84C;
  background:linear-gradient(180deg,#000 0%,#050505 12%,#0A0A0A 24%,#000 36%,
    #111 48%,#030303 60%,#161616 72%,#000 84%,#080808 100%);
  background-size:100% 800%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:comandoEsp 30s ease-in-out infinite;
  line-height:1;margin-bottom:6px;text-align:center;}
.logo-delta{-webkit-text-stroke:1.2px #E8C97A;}
.logo-sub{font-family:'Cinzel',serif;font-size:12px;letter-spacing:5px;color:rgba(0,0,0,.25);text-align:center;margin-bottom:4px;}
.logo-slogan{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:17px;color:rgba(0,0,0,.35);margin-bottom:28px;text-align:center;}
.divider{width:120px;height:1px;background:linear-gradient(to right,transparent,rgba(0,0,0,.15),transparent);margin:0 auto 20px;}

/* INSTRUCCIÓN */
.instruccion{font-family:'Cinzel',serif;font-size:11px;letter-spacing:4px;
  color:rgba(0,0,0,.3);margin-bottom:22px;text-align:center;text-transform:uppercase;}

/* GRID DE BANDERAS */
.banderas-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:310px;margin-bottom:20px;}
.bandera-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:7px;padding:18px 12px;
  background:#FAFAFA;border:1.5px solid rgba(0,0,0,.1);border-radius:16px;
  cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;
  text-decoration:none;}
.bandera-btn:active{transform:scale(0.96);background:#F0F0F0;}
.bandera-emoji{font-size:36px;line-height:1;}
.bandera-idioma{font-family:'Cinzel',serif;font-size:11px;letter-spacing:4px;color:#000;}
.bandera-nombre{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:13px;color:rgba(0,0,0,.4);}

.sello{font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:11px;color:rgba(0,0,0,.18);text-align:center;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="screen">
  <div class="logo">P<span class="logo-delta">∆</span>PIR°</div>
  <div class="logo-sub">CREAXION PAPIRO</div>
  <div class="logo-slogan">Digitalidad Sana y Segura</div>
  <div class="divider"></div>
  <div class="instruccion">Selecciona tu idioma · Choose your language</div>
  <div class="banderas-grid">
    <a class="bandera-btn" onclick="go('es')" href="javascript:void(0)">
      <span class="bandera-emoji">🇪🇸</span>
      <span class="bandera-idioma">ES</span>
      <span class="bandera-nombre">Español</span>
    </a>
    <a class="bandera-btn" onclick="go('en')" href="javascript:void(0)">
      <span class="bandera-emoji">🇬🇧</span>
      <span class="bandera-idioma">EN</span>
      <span class="bandera-nombre">English</span>
    </a>
    <a class="bandera-btn" onclick="go('pt')" href="javascript:void(0)">
      <span class="bandera-emoji">🇵🇹</span>
      <span class="bandera-idioma">PT</span>
      <span class="bandera-nombre">Português</span>
    </a>
    <a class="bandera-btn" onclick="go('el')" href="javascript:void(0)">
      <span class="bandera-emoji">🇬🇷</span>
      <span class="bandera-idioma">EL</span>
      <span class="bandera-nombre">Ελληνικά</span>
    </a>
  </div>
  <div class="sello">∆° · Creaxion Papiro © 2026 · X-7777777-LC7°</div>
</div>
<script>
window.addEventListener('load',function(){document.body.style.transition='opacity 0.4s';document.body.style.opacity='1';});
function go(lang){
  localStorage.setItem('pap_lang',lang);
  document.body.style.opacity='0';
  setTimeout(function(){location.href='recepcion_'+lang+'.html';},280);
}
(function(){
  var c=document.getElementById('c'),ctx=c.getContext('2d');
  function r(){c.width=innerWidth;c.height=innerHeight;}r();addEventListener('resize',r);
  var s=[];for(var i=0;i<60;i++)s.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*.4+.1,ph:Math.random()*Math.PI*2,sp:Math.random()*.0008+.0003});
  function d(){requestAnimationFrame(d);ctx.fillStyle='rgba(255,255,255,.6)';ctx.fillRect(0,0,c.width,c.height);
    s.forEach(function(st){st.ph+=st.sp;var a=Math.max(0,Math.sin(st.ph));a=a*a*.2;if(a<.01)return;ctx.beginPath();ctx.arc(st.x,st.y,st.r,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,'+a+')';ctx.fill();});}d();
})();
</script>
</body>
</html>
