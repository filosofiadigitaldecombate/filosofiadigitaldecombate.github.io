<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Recepción P∆PIR° · Creaxion Papiro</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:#000;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .4s;}
canvas#c{position:fixed;inset:0;width:100%;height:100%;z-index:0;}
@keyframes oroVivo{0%{background-position:0% center;}100%{background-position:500% center;}}
@keyframes logoGlow{0%,100%{filter:drop-shadow(0 0 18px rgba(201,168,76,.3));}50%{filter:drop-shadow(0 0 45px rgba(201,168,76,.7));}}

.rec-wrap{position:relative;z-index:10;text-align:center;padding:28px 24px;width:100%;max-width:340px;}

.rec-logo{font-family:'Cinzel',serif;font-size:clamp(52px,16vw,86px);font-weight:900;
  letter-spacing:clamp(6px,3vw,14px);color:#FFF;-webkit-text-stroke:1.8px #C9A84C;
  animation:logoGlow 4s ease-in-out infinite;display:block;margin-bottom:8px;}
.rec-logo-delta{-webkit-text-stroke:1.8px #E8C97A;}
.rec-sub{font-family:'Cinzel',serif;font-size:11px;letter-spacing:6px;
  color:rgba(201,168,76,.45);margin-bottom:4px;}
.rec-slogan{font-family:'Crimson Pro',serif;font-style:italic;font-size:16px;
  color:rgba(255,255,255,.22);margin-bottom:32px;}

/* CONTADOR DE VISITAS */
.rec-counter{font-family:'Special Elite',serif;font-size:13px;letter-spacing:2px;
  color:rgba(201,168,76,.35);margin-bottom:28px;}
.rec-counter span{color:rgba(201,168,76,.7);font-size:16px;}

/* BOTONES */
.rec-btns{display:flex;flex-direction:column;gap:14px;width:100%;}
.btn-rec{width:100%;padding:18px 24px;border-radius:50px;
  font-family:'Cinzel',serif;font-size:13px;letter-spacing:4px;
  cursor:pointer;border:none;transition:all .2s;}
.btn-rec:active{transform:scale(.97);}
.btn-visitante{
  background:transparent;
  border:1.5px solid rgba(201,168,76,.35);
  color:rgba(201,168,76,.7);}
.btn-visitante:active{background:rgba(201,168,76,.1);}
.btn-sesion{
  background:linear-gradient(135deg,#111,#000);
  color:#FFF;
  box-shadow:0 4px 20px rgba(0,0,0,.5);}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="rec-wrap">
  <span class="rec-logo">P<span class="rec-logo-delta">∆</span>PIR°</span>
  <div class="rec-sub">CREAXION PAPIRO</div>
  <div class="rec-slogan">Digitalidad Sana y Segura</div>

  <div class="rec-counter">
    <span id="contVisitas">···</span> visitantes
  </div>

  <div class="rec-btns">
    <button class="btn-rec btn-visitante" onclick="irVisitante()">
      VISITANTE
    </button>
    <button class="btn-rec btn-sesion" onclick="irLogin()">
      INICIAR SESIÓN
    </button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
var SB_URL='https://vdtdrijfcmttssfdtgva.supabase.co';
var SB_KEY='sb_publishable_PwlfxDM8vqAB_-LsJVMouw_Arg6epEB';
var sb=null;try{sb=window.supabase.createClient(SB_URL,SB_KEY);}catch(e){}

window.addEventListener('load',function(){
  document.body.style.opacity='1';
  cargarContador();
});

async function cargarContador(){
  if(!sb){document.getElementById('contVisitas').textContent='···';return;}
  try{
    var{data,error}=await sb.from('config_sistema').select('valor').eq('clave','visitas_total').single();
    if(data)document.getElementById('contVisitas').textContent=Number(data.valor).toLocaleString();
  }catch(e){document.getElementById('contVisitas').textContent='···';}
}

async function incrementarVisita(){
  if(!sb)return;
  try{
    await sb.rpc('incrementar_visitas',{p_clave:'visitas_total'});
  }catch(e){}
}

function irVisitante(){
  /* 1) Incrementa el contador */
  incrementarVisita();
  /* 2) Guarda idioma */
  localStorage.setItem('pap_lang','es');
  /* 3) Navega a la página de visitante */
  document.body.style.opacity='0';
  setTimeout(function(){
    location.href='visitante_es.html';
  },280);
}

function irLogin(){
  document.body.style.opacity='0';
  setTimeout(function(){location.href='login.html';},280);
}

/* COSMOS */
(function(){
  var c=document.getElementById('c'),ctx=c.getContext('2d');
  function rz(){c.width=innerWidth;c.height=innerHeight;}rz();addEventListener('resize',rz);
  var S=[],cols=['#A8D4FF','#FFFFFF','#FFE8A0','#FFB347','#C8A0FF'];
  for(var i=0;i<200;i++)S.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*.4+.1,ph:Math.random()*Math.PI*2,sp:Math.random()*.002+.0004,col:cols[Math.floor(Math.random()*cols.length)]});
  function draw(){requestAnimationFrame(draw);ctx.fillStyle='#000';ctx.fillRect(0,0,c.width,c.height);S.forEach(function(s){s.ph+=s.sp;var a=Math.max(0,Math.sin(s.ph));a=Math.min(a*a*1.5,1);ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=s.col;ctx.globalAlpha=a;ctx.fill();});ctx.globalAlpha=1;}draw();
})();
</script>
</body>
</html>
